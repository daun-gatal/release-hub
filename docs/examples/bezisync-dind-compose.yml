name: bezisync-dind-sim

# Production-shaped local simulation:
# - BeziSync API, worker, UI, metadata Postgres, and Redis run in this compose project.
# - Demo source Postgres and Kafka run as normal infrastructure services.
# - The worker deploys Debezium Server containers into a separate Docker-in-Docker
#   daemon over mTLS, similar to a remote production Docker daemon.

x-source-ip: &source-ip "172.31.0.10"
x-kafka-ip: &kafka-ip "172.31.0.11"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg2://bezisync:password@db:5432/bezisync
  REDIS_URL: redis://redis:6379/0
  BEZISYNC_ENCRYPTION_KEY: ${BEZISYNC_ENCRYPTION_KEY:?generate a Fernet key}
  BEZISYNC_JWT_SECRET: ${BEZISYNC_JWT_SECRET:?set a random secret}
  BEZISYNC_ADMIN_USERNAME: ${BEZISYNC_ADMIN_USERNAME:-admin}
  BEZISYNC_ADMIN_PASSWORD: ${BEZISYNC_ADMIN_PASSWORD:?set an admin password}
  BEZISYNC_DEMO_SOURCE_HOST: *source-ip
  BEZISYNC_DEMO_KAFKA: "172.31.0.11:9092"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bezisync
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bezisync
    volumes:
      - metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bezisync"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [bezisync]

  redis:
    image: redis:7
    networks: [bezisync]

  source-postgres:
    image: postgres:16
    command: >
      postgres -c wal_level=logical -c max_replication_slots=8 -c max_wal_senders=8
    environment:
      POSTGRES_USER: bezisync
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - ./bezisync-source-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      bezisync:
        ipv4_address: *source-ip

  source-load:
    image: postgres:16
    environment:
      PGHOST: source-postgres
      PGUSER: bezisync
      PGPASSWORD: password
      PGDATABASE: appdb
      LOAD_INTERVAL: "5"
    volumes:
      - ./bezisync-source-load.sh:/source-load.sh:ro
    entrypoint: ["sh", "/source-load.sh"]
    depends_on:
      - source-postgres
    restart: unless-stopped
    networks: [bezisync]

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.31.0.11:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      bezisync:
        ipv4_address: *kafka-ip

  dind:
    image: docker:27-dind
    privileged: true
    hostname: dind
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - dind-certs-ca:/certs/ca
      - dind-certs-client:/certs/client
      - dind-data:/var/lib/docker
    networks: [bezisync]

  init:
    image: ghcr.io/daun-gatal/bezisync-backend:latest
    command: python -m bezisync.scripts.init_db
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    networks: [bezisync]

  api:
    image: ghcr.io/daun-gatal/bezisync-backend:latest
    command: uvicorn bezisync.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      BEZISYNC_CORS_ORIGINS: '["http://localhost:8080"]'
    ports:
      - "8000:8000"
    volumes:
      - dind-certs-client:/certs/client:ro
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks: [bezisync]

  worker:
    image: ghcr.io/daun-gatal/bezisync-backend:latest
    command: celery -A bezisync.worker.celery_app worker --beat --loglevel=info
    environment:
      <<: *backend-env
    volumes:
      - dind-certs-client:/certs/client:ro
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      dind:
        condition: service_started
    networks: [bezisync]

  frontend:
    image: ghcr.io/daun-gatal/bezisync-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - api
    networks: [bezisync]

volumes:
  metadata:
  dind-certs-ca:
  dind-certs-client:
  dind-data:

networks:
  bezisync:
    name: bezisync-dind-sim
    ipam:
      config:
        - subnet: 172.31.0.0/24
